name: RandomTeleportPlugin
version: '${project.version}'
main: me.einfachduncan.rtp.RandomTeleportPlugin
api-version: '1.20'
description: A Random Teleport Plugin for Paper/Spigot servers
authors: [einfachduncan]
website: https://github.com/einfachduncan/minecraft-rtp-plugin

commands:
  rtp:
    description: Teleport to a random location
    usage: /rtp
    permission: rtp.use
    permission-message: "&cYou don't have permission to use this command."

permissions:
  rtp.use:
    description: Allows the player to use the /rtp command
    default: true
  rtp.admin:
    description: Allows the player to use admin RTP features (bypass cooldown)
    default: op
